<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APA Rate My Professor</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to right, #fff5f0, #ffe0cc);
}

header {
    background: linear-gradient(to right, #ff4d4d, #ff944d);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    padding: 30px;
    max-width: 800px;
    margin: auto;
}

button {
    background: #ff704d;
    color: white;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
}

button:hover {
    background: #ff5733;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: #ccc;
}

.stars span.active {
    color: gold;
}

.review {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

.hidden {
    display: none;
}
    select {
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
}

.review h3 {
    margin-bottom: 5px;
}

.review p {
    margin: 8px 0;
}
</style>
</head>

<body>

<header>APA Rate My Professor</header>

<div class="container">

<!-- HOME -->
<div id="home" style="text-align: center; margin-top: 50px;">
    <button onclick="showForm()">Submit a Review</button>
    <button onclick="showReviews()">View Reviews</button>
</div>

<!-- FORM -->
<div id="formPage" class="hidden">
    <h2>Submit a Review</h2>

    <input id="professor" placeholder="Professor" required>
    <input id="class" placeholder="Class" required>
    
    <label>When did you take this course?</label>
    <select id="semester" required>
        <option value="">Select semester</option>
        <option>Spring 2026</option>
        <option>Fall 2025</option>
        <option>Summer 2025</option>
        <option>Spring 2025</option>
        <option>Fall 2024</option>
        <option>Summer 2024</option>
        <option>Spring 2024</option>
        <option>Fall 2023</option>
        <option>Summer 2023</option>
        <option>Spring 2023</option>
        <option>Fall 2022</option>
        <option>Summer 2022</option>
        <option>Spring 2022</option>
        <option>Fall 2021</option>
    </select>

    <div class="stars" id="starContainer">
        <span onclick="setRating(1)">★</span>
        <span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span>
        <span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
    </div>

    <label>Difficulty (1–5)</label>
    <select id="difficulty" required>
        <option value="">Select difficulty</option>
        <option value="1">1 (Very Easy)</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5 (Very Hard)</option>
    </select>

    <textarea id="description" placeholder="Description of class" rows="5"></textarea>

    <textarea id="study" placeholder="How did you study for this class?" rows="3"></textarea>

    <button onclick="submitReview()">Submit</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- REVIEWS -->
<div id="reviewPage" class="hidden">
    <h2 style="text-align:center;">All Reviews</h2>

    <div style="text-align:center; margin-bottom:20px;">
        <input id="searchProfessor" placeholder="Search by Professor" style="width:200px;">
        <input id="searchClass" placeholder="Search by Class" style="width:200px;">
        
        <select id="sortOption">
            <option value="default">Sort</option>
            <option value="rating">Highest Rated</option>
            <option value="difficulty">Easiest Classes</option>
        </select>

        <button onclick="loadReviews()">Apply</button>
    </div>
    <div id="reviews"></div>
    <button onclick="goHome()">Back</button>
</div>

</div>

<script>
// ⭐ RATING
let selectedRating = 0;

function setRating(rating) {
    selectedRating = rating;
    let stars = document.querySelectorAll(".stars span");
    stars.forEach((star, index) => {
        star.classList.toggle("active", index < rating);
    });
}

// 🔥 NAVIGATION
function showForm() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("formPage").classList.remove("hidden");
}

function showReviews() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("reviewPage").classList.remove("hidden");
    loadReviews();
}

function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("formPage").classList.add("hidden");
    document.getElementById("reviewPage").classList.add("hidden");
}

// 🔥 FIREBASE CONFIG (YOU WILL REPLACE THIS)
const firebaseConfig = {
    apiKey: "AIzaSyBZ0cRX_TbTHNw70jE_H5hMzNtTm3mCScw",
    authDomain: "apa-rate-my-class.firebaseapp.com",
    projectId: "apa-rate-my-class",
    storageBucket: "apa-rate-my-class.firebasestorage.app",
    messagingSenderId: "999110452955",
    appId: "1:999110452955:web:1dcf2d9883a0b57186cefe"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📤 SUBMIT
function submitReview() {
    const professor = document.getElementById("professor").value;
    const className = document.getElementById("class").value;
    const semester = document.getElementById("semester").value;
    const difficulty = document.getElementById("difficulty").value;
    const description = document.getElementById("description").value;
    const study = document.getElementById("study").value;

    if (!professor || !className || !description || !study || selectedRating === 0 || !difficulty || !semester) {
        alert("All fields are required!");
        return;
    }

    db.collection("reviews").add({
        professor,
        class: className,
        semester,
        rating: selectedRating,
        difficulty: Number(difficulty),
        description,
        study
    }).then(() => {
        alert("Review submitted!");
        goHome();
    });
}

// 📊 LOAD REVIEWS + AVERAGES
function loadReviews() {
    const container = document.getElementById("reviews");
    container.innerHTML = "";

    const profSearch = document.getElementById("searchProfessor").value.toLowerCase();
    const classSearch = document.getElementById("searchClass").value.toLowerCase();
    const sortOption = document.getElementById("sortOption").value;

    db.collection("reviews").get().then(snapshot => {
        let grouped = {};

        snapshot.forEach(doc => {
            let data = doc.data();

            // FILTERING
            if (
                (profSearch && !data.professor.toLowerCase().includes(profSearch)) ||
                (classSearch && !data.class.toLowerCase().includes(classSearch))
            ) {
                return;
            }

            if (!grouped[data.professor]) {
                grouped[data.professor] = [];
            }
            grouped[data.professor].push(data);
        });

        let professors = [];

        for (let prof in grouped) {
            let reviews = grouped[prof];

            let avgRating = reviews.reduce((a, b) => a + b.rating, 0) / reviews.length;
            let avgDifficulty = reviews.reduce((a, b) => a + (b.difficulty || 0), 0) / reviews.length;

            professors.push({
                name: prof,
                reviews,
                avgRating,
                avgDifficulty
            });
        }

        // SORTING
        if (sortOption === "rating") {
            professors.sort((a, b) => b.avgRating - a.avgRating);
        } else if (sortOption === "difficulty") {
            professors.sort((a, b) => a.avgDifficulty - b.avgDifficulty);
        }

        // DISPLAY
        professors.forEach(prof => {
            let block = `<div class="review">
                <h3>${prof.name}</h3>
                <p>⭐ Rating: ${prof.avgRating.toFixed(1)} | 📚 Difficulty: ${prof.avgDifficulty.toFixed(1)}</p>`;

            prof.reviews.forEach(r => {
                block += `<p>
                   <b>${r.class}</b> (${r.semester}) — ⭐ ${r.rating}, Difficulty: ${r.difficulty}<br>
                    ${r.description}<br>
                    <i>Study Method:</i> ${r.study}
                </p>`;
            });

            block += `</div>`;
            container.innerHTML += block;
        });
    });
}
</script>

</body>
</html>
