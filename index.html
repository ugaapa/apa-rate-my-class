<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APA Rate My Professor</title>

<!-- Styles -->
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to right, #fff5f0, #ffe0cc);
}

header {
    background: linear-gradient(to right, #ff4d4d, #ff944d);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

button {
    background: #ff704d;
    color: white;
    border: none;
    padding: 12px 25px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
}

button:hover {
    background: #ff5733;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#suggestions {
    position: absolute;
    max-width: 400px;
    z-index: 10;
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #ffe0cc;
}

#classPrefix {
    width: 40%;
}

#classNumber {
    width: 60%;
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: #ccc;
}

.stars span.active {
    color: gold;
}

.review-card {
    background: white;
    padding: 15px 20px;
    margin: 15px 0;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.review-card h3 {
    margin: 0;
}

.review-card .avg {
    font-weight: bold;
    margin: 5px 0 10px 0;
}

.hidden { display: none; }

.search-sort {
    text-align: center;
    margin-bottom: 20px;
}

.search-sort input, .search-sort select {
    width: 180px;
    display: inline-block;
    margin: 0 5px;
}
</style>

</head>
<body>

<header>APA Rate My Professor</header>

<div class="container">

<!-- HOME -->
<div id="home" style="text-align: center; margin-top: 50px;">
    <button onclick="showForm()">Submit a Review</button>
    <button onclick="showReviews()">View Reviews</button>
</div>

<!-- FORM -->
<div id="formPage" class="hidden">
    <h2 style="text-align:center;">Submit a Review</h2>

    <label>Professor</label>
        <input id="professor" placeholder="Start typing a name..." autocomplete="off" required>
        <div id="suggestions" style="background:white; border:1px solid #ccc; border-radius:6px;"></div>
    
    <label>Class</label>

    <div style="display:flex; gap:10px;">
    <select id="classPrefix" required>
        <option value="">Select</option>
        <option>ARTI</option>
        <option>ASTR</option>
        <option>BIOL</option>
        <option>CBIO</option>
        <option>CHEM</option>
        <option>CHFD</option>
        <option>ECHD</option>
        <option>ECOL</option>
        <option>EPSY</option>
        <option>GENE</option>
        <option>GEOG</option>
        <option>GEOL</option>
        <option>HDFS</option>
        <option>IHDD</option>
        <option>KINS</option>
        <option>PHIL</option>
        <option>PSYC</option>
        <option>PHYS</option>
        <option>SOCI</option>
        <option>SOWK</option>
    </select>

    <input id="classNumber" placeholder="e.g. 2350" required>
    </div>

    <label>When did you take this course?</label>
    <select id="semester" required>
        <option value="">Select semester</option>
        <option>Spring 2026</option>
        <option>Fall 2025</option>
        <option>Summer 2025</option>
        <option>Spring 2025</option>
        <option>Fall 2024</option>
        <option>Summer 2024</option>
        <option>Spring 2024</option>
        <option>Fall 2023</option>
        <option>Summer 2023</option>
        <option>Spring 2023</option>
        <option>Fall 2022</option>
        <option>Summer 2022</option>
        <option>Spring 2022</option>
        <option>Fall 2021</option>
    </select>

    <div class="stars" id="starContainer">
        <span onclick="setRating(1)">★</span>
        <span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span>
        <span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
    </div>

    <label>Difficulty (1–5)</label>
    <select id="difficulty" required>
        <option value="">Select difficulty</option>
        <option value="1">1 (Very Easy)</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5 (Very Hard)</option>
    </select>

    <textarea id="description" placeholder="Description of class" rows="5"></textarea>
    <textarea id="study" placeholder="How did you study for this class?" rows="3"></textarea>

    <button onclick="submitReview()">Submit</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- REVIEWS -->
<div id="reviewPage" class="hidden">
    <h2 style="text-align:center;">All Reviews</h2>

    <div class="search-sort">
        <input id="searchProfessor" placeholder="Search by Professor">
        <input id="searchClass" placeholder="Search by Class">
        <select id="sortOption">
            <option value="default">Sort</option>
            <option value="rating">Highest Rated</option>
            <option value="difficulty">Easiest Classes</option>
        </select>
        <button onclick="loadReviews()">Apply</button>
    </div>

    <div id="reviews"></div>
    <button onclick="goHome()">Back</button>
</div>

</div>

<!-- Firebase + JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyBZ0cRX_TbTHNw70jE_H5hMzNtTm3mCScw",
    authDomain: "apa-rate-my-class.firebaseapp.com",
    projectId: "apa-rate-my-class"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

    let professorList = [];

async function loadProfessorNames() {
    const snapshot = await getDocs(collection(db, "reviews"));
    const names = new Set();

    snapshot.forEach(doc => {
        const data = doc.data();
        if (data.professor) names.add(data.professor);
    });

    professorList = Array.from(names);
}

loadProfessorNames();

    const input = document.getElementById("professor");
const suggestionsBox = document.getElementById("suggestions");

input.addEventListener("input", () => {
    const value = input.value.toLowerCase();
    suggestionsBox.innerHTML = "";

    if (!value) return;

    const matches = professorList.filter(name =>
        name.toLowerCase().includes(value)
    );

    matches.slice(0, 5).forEach(name => {
        const div = document.createElement("div");
        div.textContent = name;
        div.classList.add("suggestion-item");

        div.onclick = () => {
            input.value = name;
            suggestionsBox.innerHTML = "";
        };

        suggestionsBox.appendChild(div);
    });
});

// GLOBAL variables
let selectedRating = 0;

// ⭐ Rating
window.setRating = function (rating) {
    selectedRating = rating;
    let stars = document.querySelectorAll(".stars span");
    stars.forEach((star, index) => {
        star.classList.toggle("active", index < rating);
    });
};

// 🔥 Navigation
window.showForm = function() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("formPage").classList.remove("hidden");
};
window.showReviews = function() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("reviewPage").classList.remove("hidden");
    loadReviews();
};
window.goHome = function() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("formPage").classList.add("hidden");
    document.getElementById("reviewPage").classList.add("hidden");
};

// 🔥 Submit Review
window.submitReview = async function () {
    const professor = document.getElementById("professor").value;
    const classPrefix = document.getElementById("classPrefix").value;
    const classNumber = document.getElementById("classNumber").value;
    const className = classPrefix + classNumber;
    const semester = document.getElementById("semester").value;
    const description = document.getElementById("description").value;
    const difficulty = document.getElementById("difficulty").value;
    const study = document.getElementById("study").value;

    if (!professor || !classPrefix || !classNumber || !semester || !description || !study || selectedRating === 0 || !difficulty) {
    }

    try {
        await addDoc(collection(db, "reviews"), {
            professor,
            class: className,
            semester,
            rating: selectedRating,
            difficulty: Number(difficulty),
            description,
            study
        });
        alert("Review submitted!");
        goHome();
    } catch (err) {
        console.error(err);
        alert("Error submitting review");
    }
};

// 🔥 Load & display reviews
async function loadReviews() {
    const container = document.getElementById("reviews");
    container.innerHTML = "";

    const profSearch = document.getElementById("searchProfessor").value.toLowerCase();
    const classSearch = document.getElementById("searchClass").value.toLowerCase();
    const sortOption = document.getElementById("sortOption").value;

    const querySnapshot = await getDocs(collection(db, "reviews"));
    let grouped = {};

    querySnapshot.forEach(doc => {
        const data = doc.data();

        if ((profSearch && !data.professor.toLowerCase().includes(profSearch)) ||
            (classSearch && !data.class.toLowerCase().includes(classSearch))) return;

        if (!grouped[data.professor]) grouped[data.professor] = [];
        grouped[data.professor].push(data);
    });

    // Convert grouped to array for sorting
    let professors = [];
    for (let prof in grouped) {
        const reviews = grouped[prof];
        const avgRating = reviews.reduce((a,b)=>a+b.rating,0)/reviews.length;
        const avgDifficulty = reviews.reduce((a,b)=>a+b.difficulty,0)/reviews.length;
        professors.push({name: prof, reviews, avgRating, avgDifficulty});
    }

    if (sortOption === "rating") professors.sort((a,b)=>b.avgRating - a.avgRating);
    if (sortOption === "difficulty") professors.sort((a,b)=>a.avgDifficulty - b.avgDifficulty);

    professors.forEach(prof => {
        let block = `<div class="review-card">
            <h3>${prof.name}</h3>
            <div class="avg">⭐ Rating: ${prof.avgRating.toFixed(1)} | 📚 Difficulty: ${prof.avgDifficulty.toFixed(1)}</div>`;
        prof.reviews.forEach(r => {
            block += `<p><b>${r.class}</b> (${r.semester}) — ⭐ ${r.rating}, Difficulty: ${r.difficulty}<br>
            ${r.description}<br><i>Study Method:</i> ${r.study}</p>`;
        });
        block += `</div>`;
        container.innerHTML += block;
    });
}
    
</script>

</body>
</html>
